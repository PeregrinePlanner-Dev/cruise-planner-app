<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Viewer · Cruise Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0d12;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
    }

    /* -- Header -- */
    .viewer-header {
      background: #1a3d6e;
      color: white;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      height: 44px;
    }

    .viewer-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      height: 28px;
      width: auto;
      display: block;
    }

    .viewer-header-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      opacity: 0.9;
    }

    .sync-chip {
      display: none;
      background: #f59e0b;
      color: #1c1917;
      font-size: 11px;
      font-weight: 600;
      border-radius: 20px;
      padding: 3px 10px;
      cursor: pointer;
      animation: pulse-chip 2s ease-in-out infinite;
    }

    .sync-chip.visible { display: inline-flex; align-items: center; gap: 5px; }

    @keyframes pulse-chip {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* -- Video area -- */
    .video-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* -- Info bar below video -- */
    .video-info {
      flex-shrink: 0;
      padding: 12px 20px 14px;
      background: #111827;
      border-top: 1px solid #1e2535;
    }

    .video-info-title {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
      line-height: 1.3;
    }

    .video-info-context {
      font-size: 12px;
      color: #64748b;
      font-style: italic;
      margin-top: 3px;
    }

    .video-info-category {
      display: inline-block;
      margin-top: 7px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #93c5fd;
      background: #1e3a5f;
      border-radius: 4px;
      padding: 2px 7px;
    }
  </style>
</head>
<body>

<div class="viewer-header">
  <div class="viewer-header-left">
    <img class="header-logo" src="/static/images/peregrine-logo.png" alt="Peregrine">
    <span class="viewer-header-title">Video Viewer</span>
  </div>
  <span class="sync-chip" id="sync-chip" title="The planner updated the context video — click to switch">
    ✦ Trip video updated — <u>switch</u>
  </span>
</div>

<div class="video-wrap">
  <video id="main-video" muted playsinline controls autoplay></video>
</div>

<div class="video-info">
  <div class="video-info-title" id="info-title">Loading…</div>
  <div class="video-info-context" id="info-context"></div>
  <span class="video-info-category" id="info-category"></span>
</div>

<script>
  const videoEl     = document.getElementById("main-video");
  const infoTitle   = document.getElementById("info-title");
  const infoContext = document.getElementById("info-context");
  const infoCat     = document.getElementById("info-category");
  const syncChip    = document.getElementById("sync-chip");

  let currentUrl     = "";
  let isOnContextVid = true;
  let pendingContext = null;

  const CAT_LABELS = {
    airport:            "Airports",
    cruise_terminal:    "Terminals",
    destination:        "Destinations",
    attraction:         "Attractions",
    castle:             "Castles",
    cathedral:          "Cathedrals",
    monument:           "Monuments",
    museum:             "Museums",
    nature:             "Nature",
    "pre-cruise-hotel": "Hotels",
    resort:             "Resorts",
    "river-port":       "River Ports",
    "theme-park":       "Theme Parks",
    zoo:                "Zoos",
  };

  function catLabel(c) {
    return CAT_LABELS[c] || (c || "").replace(/-|_/g, " ").replace(/\b\w/g, l => l.toUpperCase());
  }

  function playVideo(url, title, context, category, userInitiated) {
    if (userInitiated) isOnContextVid = false;

    currentUrl = url;
    videoEl.src = url;
    videoEl.load();
    videoEl.play().catch(() => {});

    infoTitle.textContent   = title || "";
    infoContext.textContent = context || "";

    const label = catLabel(category);
    infoCat.textContent  = label;
    infoCat.style.display = category ? "" : "none";
  }

  function loadInitialVideo() {
    try {
      const stored = localStorage.getItem("peregrine_context_video");
      if (stored) {
        const v = JSON.parse(stored);
        playVideo(v.url, v.title, v.context, v.category || "", false);
        return;
      }
    } catch {}
    playVideo(
      "https://pub-04ae0c3f9531493293b7ccda7216ee88.r2.dev/cruise-terminals/port-everglades-terminal-3.mp4",
      "Port Everglades · Fort Lauderdale",
      "your departure port",
      "cruise_terminal",
      false
    );
  }

  // Listen for context updates from the planner (localStorage storage event)
  window.addEventListener("storage", (e) => {
    if (e.key !== "peregrine_context_video") return;
    try {
      const v = JSON.parse(e.newValue);
      if (!v || v.url === currentUrl) return;

      if (isOnContextVid) {
        playVideo(v.url, v.title, v.context, v.category || "", false);
        isOnContextVid = true;
      } else {
        pendingContext = v;
        syncChip.classList.add("visible");
      }
    } catch {}
  });

  syncChip.addEventListener("click", () => {
    if (!pendingContext) return;
    playVideo(pendingContext.url, pendingContext.title, pendingContext.context, pendingContext.category || "", false);
    isOnContextVid = true;
    syncChip.classList.remove("visible");
    pendingContext = null;
  });

  loadInitialVideo();
</script>
</body>
</html>
